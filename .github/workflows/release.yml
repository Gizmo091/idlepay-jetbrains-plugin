name: Release

# Build the plugin and publish a GitHub Release whenever a version tag (e.g. v0.2.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: Build & release plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        run: echo "PLUGIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build plugin
        run: ./gradlew buildPlugin -Pversion="${PLUGIN_VERSION}" --console=plain --no-configuration-cache

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: idlepay-${{ env.PLUGIN_VERSION }}
          path: build/distributions/*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
